services:
  api: &main_app
    build:
      context: .
      target: dev
      dockerfile: ./Dockerfile
    image: banking_fastapi:${BANKING_FASTAPI_VERSION:-latest}
    restart: always
    ports:
      # Exposes application port.
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app/src/
  db:
    image: mongo:8.0
    hostname: banking_fastapi-db
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${BANKING_FASTAPI_DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${BANKING_FASTAPI_DB_PASS}
    command: "mongod"
    volumes:
      - banking_fastapi-db-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 40

volumes:
  banking_fastapi-db-data:
    name: banking_fastapi-db-data
